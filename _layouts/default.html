<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f9; color: #333; }
        header { background: #333; color: #fff; padding: 20px; text-align: center; }
        nav { background: #444; padding: 10px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        main { max-width: 800px; margin: 30px auto; padding: 20px; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        footer { text-align: center; padding: 20px; background: #333; color: white; position: fixed; bottom: 0; width: 100%; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; }
        li a { text-decoration: none; color: #0076a3; font-size: 18px; }
    </style>
</head>
<body>

    <header>
        <h1>{{ site.title }}</h1>
        <p>{{ site.description }}</p>
    </header>

    <nav>
        <a href="/quizly/">الرئيسية</a>
        <a href="/quizly/my-game/">اللعبة الأولى</a>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; 2026 جميع الحقوق محفوظة</p>
    </footer>

</body>
</html>
