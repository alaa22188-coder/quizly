<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- العناوين والوصف الافتراضي والديناميكي -->
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    
    <!-- رابط الكانونيكال التلقائي (Canonical URL) -->
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
    
    <!-- بطاقات الميتا لمواقع التواصل الاجتماعي (Open Graph / Facebook / X) -->
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <meta name="twitter:card" content="summary">

    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f9; color: #333; }
        header { background: #333; color: #fff; padding: 20px; text-align: center; }
        nav { background: #444; padding: 10px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        main { max-width: 800px; margin: 30px auto; padding: 20px; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); padding-bottom: 60px; }
        footer { text-align: center; padding: 20px; background: #333; color: white; margin-top: 50px; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; }
        li a { text-decoration: none; color: #0076a3; font-size: 18px; }
        
        /* استايل شريط التنقل (Breadcrumb) */
        .breadcrumbs { font-size: 14px; color: #666; margin-bottom: 20px; padding: 8px 0; border-bottom: 1px dashed #ccc; }
        .breadcrumbs a { color: #0076a3; text-decoration: none; }
        .breadcrumbs span { color: #999; margin: 0 5px; }
    </style>
</head>
<body>

    <header>
        <h1>{{ site.title }}</h1>
        <p>{{ site.description }}</p>
    </header>

    <nav>
        <a href="/quizly/">الرئيسية</a>
       <a href="{{ site.baseurl }}/games/">قسم الألعاب والاختبارات</a>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; 2026 جميع الحقوق محفوظة</p>
    </footer>

</body>
</html>
